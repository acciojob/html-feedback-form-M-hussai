<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<h3>Feedback Form</h3>
	<form method="post">
		<label for="name">Name</label>
		<input id="name" type="text" maxlength="50" minlength="3" required name="Name">
		<br>
		<label for="portfolio">Portfolio</label>
		<input id="portfolio" type="url" required name="portfolio">
		<br>
		<label for="favColor">Favorite Color</label>
		<input id="favColor" type="color">
		<br>
		<label for="likeness">Likeness</label>
		<input id="likeness" type="range" min="1" max="100">
		<br>
		<button>submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
