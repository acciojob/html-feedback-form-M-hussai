<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form><fieldset><legend>Feedback Form</legend>
		<label for="name">Name</label>
		<input id="Name" type="text" maxlength="50" minlength="3" required name="Name">
		<br>
		<label for="portfolio">portfolio</label>
		<input id="portfolio" type="url" required name="portfolio">
		<br>
		<label for="favColor">Favourite Color</label>
		<input id="favColor" type="color" required name="color">
		<br>
		<label for="like">Likeness</label>
		<input id="like" type="range" min="1" max="100" required name="like">
		<br>
		<button type="submit" method="post">submit</button>
		</fieldset>
		
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
